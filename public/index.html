<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playlist Albums & Recommendations</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #121212;
      color: #fff;
      min-height: 100vh;
      padding: 2rem;
    }

    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 2rem; }
    .header-text h1 { font-size: 1.8rem; margin-bottom: 0.25rem; }
    .header-text .subtitle { color: #aaa; font-size: 0.9rem; }
    .auth-btn {
      padding: 0.6rem 1.25rem;
      border-radius: 99px;
      border: 1px solid #1db954;
      background: transparent;
      color: #1db954;
      font-weight: 600;
      font-size: 0.88rem;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .auth-btn:hover { background: #1db954; color: #000; }

    .search-bar {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
    }

    input {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #fff;
      font-size: 0.95rem;
    }

    input::placeholder { color: #666; }
    input:focus { outline: none; border-color: #1db954; }

    button {
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      border: none;
      background: #1db954;
      color: #000;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { background: #1ed760; }
    button:disabled { background: #555; color: #888; cursor: not-allowed; }

    .error {
      background: #3d1515;
      border: 1px solid #7f2020;
      color: #f87171;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .sections { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

    @media (max-width: 768px) { .sections { grid-template-columns: 1fr; } }

    section h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #1db954;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .count {
      background: #1db954;
      color: #000;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.1rem 0.5rem;
      border-radius: 99px;
    }

    .album-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 600px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .album-grid::-webkit-scrollbar { width: 4px; }
    .album-grid::-webkit-scrollbar-track { background: #1e1e1e; border-radius: 2px; }
    .album-grid::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

    .album-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.75rem;
      background: #1e1e1e;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
    }

    .album-card img {
      width: 44px;
      height: 44px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: #333;
    }

    .album-info { overflow: hidden; }

    .album-name {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .album-artist {
      font-size: 0.78rem;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .recs-box {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      max-height: 600px;
      overflow-y: auto;
      padding-right: 0.25rem;
    }

    .recs-box::-webkit-scrollbar { width: 4px; }
    .recs-box::-webkit-scrollbar-track { background: #1e1e1e; border-radius: 2px; }
    .recs-box::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

    .rec-card {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0.75rem 1rem;
    }

    .rec-top {
      display: flex;
      align-items: baseline;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 0.5rem;
    }

    .rec-album {
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
    }

    .rec-dot { color: #555; }

    .rec-artist {
      font-size: 0.9rem;
      color: #aaa;
    }

    .rec-year {
      margin-left: auto;
      font-size: 0.78rem;
      font-weight: 600;
      color: #1db954;
      border: 1px solid #1db954;
      border-radius: 99px;
      padding: 0.15rem 0.6rem;
      white-space: nowrap;
    }

    .rec-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }

    .rec-tag {
      font-size: 0.75rem;
      font-weight: 500;
      background: #1db954;
      color: #000;
      border-radius: 99px;
      padding: 0.2rem 0.7rem;
    }

    .recs-placeholder {
      color: #666;
      font-size: 0.9rem;
      padding: 0.5rem 0;
    }

    .skeleton {
      background: linear-gradient(90deg, #1e1e1e 25%, #2a2a2a 50%, #1e1e1e 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 56px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #444;
      border-top-color: #1db954;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .export-btns { display: flex; gap: 0.4rem; margin-left: auto; }

    .export-btn {
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      border: 1px solid #444;
      background: #2a2a2a;
      color: #ccc;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
    }

    .export-btn:hover { border-color: #1db954; color: #1db954; background: #1a2a1a; }
    .export-btn.copied { border-color: #1db954; color: #1db954; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-text">
      <h1>Album Recommender</h1>
      <p class="subtitle">Enter a Spotify playlist ID to browse albums and get recommendations.</p>
    </div>
    <a href="/auth/login" class="auth-btn" target="_blank">Connect Spotify</a>
  </div>

  <div class="search-bar">
    <input id="playlistId" type="text" placeholder="Spotify playlist ID (e.g. 2tnuyasc7u4Nrz1nT7s0Pm)" />
    <button id="loadBtn" onclick="load()">Load</button>
  </div>

  <div id="error" class="error" style="display:none"></div>

  <div class="sections" id="sections" style="display:none">
    <section>
      <h2>Playlist Albums <span class="count" id="albumCount">0</span></h2>
      <div class="album-grid" id="albumGrid"></div>
    </section>

    <section>
      <h2>
        Recommendations <span class="spinner" id="recSpinner" style="display:none"></span>
        <div class="export-btns" id="exportBtns" style="display:none">
          <button class="export-btn" onclick="copyRecs(this)" title="Copy to clipboard">Copy</button>
          <button class="export-btn" onclick="downloadRecs()" title="Download as text file">Download</button>
        </div>
      </h2>
      <div class="recs-box" id="recsBox"><p class="recs-placeholder">Recommendations will appear here after albums load.</p></div>
    </section>
  </div>

  <script>
    const $ = id => document.getElementById(id);

    async function load() {
      const id = $('playlistId').value.trim();
      if (!id) return;

      $('error').style.display = 'none';
      $('sections').style.display = 'none';
      $('loadBtn').disabled = true;
      $('loadBtn').textContent = 'Loading…';

      try {
        // Fetch albums
        const albumRes = await fetch(`/playlists/${id}/albums`);
        const albumData = await albumRes.json();

        if (!albumRes.ok) throw new Error(albumData.error ?? 'Failed to fetch albums');

        renderAlbums(albumData.albums);
        $('albumCount').textContent = albumData.total;
        $('sections').style.display = 'grid';

        // Fetch recommendations in parallel (they take longer)
        $('recsBox').innerHTML = '<p class="recs-placeholder">Generating recommendations…</p>';
        $('recSpinner').style.display = 'inline-block';

        const recRes = await fetch(`/playlists/${id}/recommendations`);
        const recData = await recRes.json();

        if (!recRes.ok) throw new Error(recData.error ?? 'Failed to fetch recommendations');

        renderRecs(recData.recommendations);
        $('exportBtns').style.display = 'flex';
      } catch (err) {
        $('error').textContent = err.message;
        $('error').style.display = 'block';
      } finally {
        $('recSpinner').style.display = 'none';
        $('loadBtn').disabled = false;
        $('loadBtn').textContent = 'Load';
      }
    }

    function renderAlbums(albums) {
      const grid = $('albumGrid');
      grid.innerHTML = '';
      for (const album of albums) {
        const card = document.createElement('div');
        card.className = 'album-card';
        card.innerHTML = `
          <img src="${album.image ?? ''}" alt="${esc(album.name)}" onerror="this.style.background='#333';this.removeAttribute('src')" />
          <div class="album-info">
            <div class="album-name">${esc(album.name)}</div>
            <div class="album-artist">${esc(album.artists.join(', '))}</div>
          </div>`;
        grid.appendChild(card);
      }
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let currentRecs = [];

    function renderRecs(recs) {
      currentRecs = recs;
      const box = $('recsBox');
      box.innerHTML = '';
      recs.forEach((r, i) => {
        const card = document.createElement('div');
        card.className = 'rec-card';
        card.innerHTML = `
          <div class="rec-top">
            <span class="rec-album">${esc(r.album)}</span>
            <span class="rec-dot">·</span>
            <span class="rec-artist">${esc(r.artist)}</span>
            <span class="rec-year">${r.year}</span>
          </div>
          <div class="rec-tags">
            ${(r.similar_artists ?? []).map(a => `<span class="rec-tag">${esc(a)}</span>`).join('')}
          </div>`;
        box.appendChild(card);
      });
    }

    function copyRecs(btn) {
      const text = currentRecs.map(r =>
        `${r.album} — ${r.artist} (${r.year})\nSimilar to: ${(r.similar_artists ?? []).join(', ')}`
      ).join('\n\n');
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    }

    function downloadRecs() {
      const text = currentRecs.map(r =>
        `${r.album} — ${r.artist} (${r.year})\nSimilar to: ${(r.similar_artists ?? []).join(', ')}`
      ).join('\n\n');
      const blob = new Blob([text], { type: 'text/plain' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'recommendations.txt';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // Allow pressing Enter in the input
    $('playlistId').addEventListener('keydown', e => { if (e.key === 'Enter') load(); });
  </script>
</body>
</html>
